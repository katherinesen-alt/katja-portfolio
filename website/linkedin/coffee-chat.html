<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>katja.design — Coffee Chat (LinkedIn)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
<style>
  @font-face{font-family:"HK Grotesk";src:url("../brand/assets/fonts/HKGrotesk-Light.woff2") format("woff2");font-weight:300;font-display:swap}
  @font-face{font-family:"HK Grotesk";src:url("../brand/assets/fonts/HKGrotesk-Regular.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"HK Grotesk";src:url("../brand/assets/fonts/HKGrotesk-Medium.woff2") format("woff2");font-weight:500;font-display:swap}
  @font-face{font-family:"HK Grotesk";src:url("../brand/assets/fonts/HKGrotesk-SemiBold.woff2") format("woff2");font-weight:600;font-display:swap}
  @font-face{font-family:"HK Grotesk";src:url("../brand/assets/fonts/HKGrotesk-Bold.woff2") format("woff2");font-weight:700;font-display:swap}

  :root{
    --bg:#F4EFE6;
    --ink:#1E1E2A;
    --cream-2:#E8E1D2;
    --pink:#FFB3FE;
    --lime:#EFFE99;
    --cyan:#8EF6F7;
    --lavender:#CDD0F9;
    --grad-pastel:linear-gradient(110deg,#F0FAB2 0%,#EFFD99 10%,#EFFF99 20%,#F1F5A7 30%,#F6E0C3 40%,#FACAE1 50%,#FEB5FD 60%,#E7C3FF 70%,#C7D3F9 80%,#ACE5FC 90%,#9FE9EF 100%);
    --grad-hero:linear-gradient(110deg,#FFB3FE 0%,#CDD0F9 45%,#8EF6F7 100%);
    --muted:#404047;
    --hairline:#D6D1CB;
    --f-display:"HK Grotesk","Helvetica Neue",Arial,sans-serif;
    --f-body:"Onest","Helvetica Neue",Arial,sans-serif;
    --f-mono:"Space Grotesk","Helvetica Neue",Arial,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:#2C3140;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:48px;
    font-family:var(--f-body);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }

  /* The post canvas — 1200×1200, square for LinkedIn feed */
  .post{
    width:1200px;height:1200px;
    background:var(--bg);
    color:var(--ink);
    position:relative;
    overflow:hidden;
    isolation:isolate;
    padding:80px;
    display:flex;flex-direction:column;justify-content:space-between;
    box-shadow:0 40px 80px -20px rgba(0,0,0,.45);
  }

  /* Pastel gradient blob — the brand "signature" — anchors the bottom-right */
  .post::before{
    content:"";
    position:absolute;
    right:-260px;bottom:-260px;
    width:880px;height:880px;
    background:var(--grad-pastel);
    border-radius:50%;
    filter:blur(2px);
    z-index:0;
    opacity:.95;
  }

  /* Tiny grain to keep it from feeling digitally clean */
  .post::after{
    content:"";
    position:absolute;inset:0;z-index:5;pointer-events:none;
    background-image:radial-gradient(rgba(30,30,42,.04) 1px, transparent 1px);
    background-size:3px 3px;
    mix-blend-mode:multiply;
    opacity:.6;
  }

  /* ───────── meta strip ───────── */
  .meta{
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--f-mono);font-size:14px;font-weight:400;
    letter-spacing:0.10em;text-transform:uppercase;color:var(--muted);
    position:relative;z-index:3;
  }
  .meta b{color:var(--ink);font-weight:500}
  .meta .dot{display:inline-block;width:6px;height:6px;background:var(--ink);border-radius:50%;margin:0 10px;vertical-align:middle}

  /* ───────── content stack ───────── */
  .stack{
    position:relative;z-index:3;
    display:flex;flex-direction:column;gap:36px;
    max-width:880px;
  }

  .eyebrow{
    font-family:var(--f-display);
    font-size:32px;font-weight:500;
    letter-spacing:-0.015em;line-height:1.25;
    color:var(--ink);
    max-width:22ch;
  }
  .eyebrow span{color:var(--muted)}

  .hero{
    font-family:var(--f-display);
    font-size:260px;font-weight:500;
    letter-spacing:-0.05em;line-height:0.86;
    color:var(--ink);
  }
  .hero em{
    font-style:normal;
    background:var(--grad-hero);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
  }

  .body{
    font-family:var(--f-body);
    font-size:26px;font-weight:300;
    letter-spacing:-0.005em;line-height:1.45;
    color:var(--muted);
    max-width:30ch;
  }
  .body b{font-weight:500;color:var(--ink)}

  /* ───────── footer row (cta + signature) ───────── */
  .foot{
    display:flex;justify-content:space-between;align-items:flex-end;
    gap:32px;position:relative;z-index:3;
  }
  .cta{
    font-family:var(--f-mono);font-size:14px;font-weight:500;
    letter-spacing:0.10em;text-transform:uppercase;
    color:var(--ink);
    display:inline-flex;align-items:center;gap:12px;
    padding:16px 24px;border-radius:999px;
    background:var(--ink);color:#F4EFE6;
  }
  .cta .arr{display:inline-block;transform:translateY(-1px)}

  .sig{
    font-family:var(--f-display);
    font-weight:700;
    font-size:28px;
    letter-spacing:-0.04em;line-height:0.9;
    text-align:right;
    color:var(--ink);
    opacity:.85;
  }

  /* ───────── mascot ───────── */
  .cat{
    position:absolute;
    right:40px;bottom:120px;
    width:440px;height:auto;
    mix-blend-mode:multiply;
    z-index:2;
    filter:drop-shadow(0 8px 0 rgba(30,30,42,.06));
  }

  /* ───────── small caption row above hero ───────── */
  .caption-row{
    display:flex;align-items:center;gap:14px;
    font-family:var(--f-mono);font-size:13px;font-weight:400;
    letter-spacing:0.10em;text-transform:uppercase;color:var(--muted);
  }
  .caption-row .line{flex:0 0 64px;height:1px;background:var(--ink);opacity:.35}

</style>
</head>
<body>

<div class="post" id="post">

  <!-- top meta -->
  <header class="meta">
    <div><b>katja.design</b><span class="dot"></span>open invite</div>
    <div>04 / 2026</div>
  </header>

  <!-- hero stack -->
  <div class="stack">
    <div class="caption-row"><span class="line"></span>For product designers</div>

    <div class="eyebrow">
      Anyone else have thoughts on our <span>tools and pain points?</span>
    </div>

    <h1 class="hero">Let's<br/><em>talk.</em></h1>

    <p class="body">
      If you're up for a <b>coffee chat</b>, send me a message.
    </p>
  </div>

  <!-- mascot -->
  <img class="cat" src="../brand/assets/m-04.png" alt="" />

  <!-- footer -->
  <footer class="foot">
    <a class="cta"><span class="arr">→</span> DM me</a>
    <div class="sig">katja.<br/>design</div>
  </footer>

</div>

</body>
</html>
